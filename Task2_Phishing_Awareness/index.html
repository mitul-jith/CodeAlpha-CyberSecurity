```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Microsoft Sign In - Demo</title>

<style>

body{
    margin:0;
    background:#ededed;
    font-family:"Segoe UI", Arial, sans-serif;
}

.login-box{
    width:420px;
    background:white;
    margin:80px auto;
    padding:40px;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
}

.ms-logo{
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.square{
    width:15px;
    height:15px;
}

.title{
    font-size:28px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    box-sizing:border-box;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#0078d4;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#106ebe;
}

.notice{
    margin-top:20px;
    padding:10px;
    background:#fff3cd;
    border:1px solid #ffeeba;
    font-size:12px;
}

a{
    color:#0067b8;
    text-decoration:none;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:12px;
}

</style>
</head>

<body>

<div class="login-box">

<div class="ms-logo">

<div class="row">
<div class="square" style="background:#f25022;"></div>
<div class="square" style="background:#7fba00;"></div>
</div>

<div class="row">
<div class="square" style="background:#00a4ef;"></div>
<div class="square" style="background:#ffb900;"></div>
</div>

</div>

<div class="title">
Sign in
</div>

<input type="email" placeholder="Email, phone, or Skype">

<input type="password" placeholder="Password">

<button>
Next
</button>

<p>
No account?
<a href="#">Create one!</a>
</p>

<p>
<a href="#">Forgot password?</a>
</p>

<div class="notice">
⚠ Educational Security Awareness Demonstration Only.
No credentials are collected.
</div>

</div>

<div class="footer">
CodeAlpha Cyber Security Internship Project
</div>

</body>
</html>
```
